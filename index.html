<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power BI Layout</title>

<style>
body {
    margin: 0;
    width: 1280px;
    height: 720px;
    background: #f4f6fb;
    overflow: hidden;
    font-family: Segoe UI, sans-serif;
}

/* Main container */
.wrapper {
    width: 1280px;
    height: 720px;
    padding: 40px;
    box-sizing: border-box;
}

/* KPI row */
.kpi-row {
    display: flex;
    gap: 20px;
    margin-bottom: 25px;
}

.kpi-card {
    flex: 1;
    height: 90px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
}

/* Middle row */
.middle-row {
    display: flex;
    gap: 25px;
    margin-bottom: 25px;
}

.large-box {
    flex: 2;
    height: 260px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
}

.side-box {
    flex: 1;
    height: 260px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
}

/* Bottom row */
.bottom-row {
    display: flex;
    gap: 25px;
}

.bottom-box {
    flex: 1;
    height: 180px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- KPI Row -->
    <div class="kpi-row">
        <div class="kpi-card"></div>
        <div class="kpi-card"></div>
        <div class="kpi-card"></div>
        <div class="kpi-card"></div>
    </div>

    <!-- Middle Row -->
    <div class="middle-row">
        <div class="large-box"></div>
        <div class="side-box"></div>
    </div>

    <!-- Bottom Row -->
    <div class="bottom-row">
        <div class="bottom-box"></div>
        <div class="bottom-box"></div>
    </div>

</div>

</body>
</html>
