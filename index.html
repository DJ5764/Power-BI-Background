<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Power BI Premium Layout</title>

<style>
body {
    margin: 0;
    font-family: Segoe UI, sans-serif;
    background: #f4f6f9;
}

/* Sidebar */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #111827;
    position: fixed;
    padding-top: 30px;
}

.sidebar h2 {
    color: white;
    text-align: center;
    margin-bottom: 40px;
}

.sidebar div {
    color: #9ca3af;
    padding: 12px 30px;
}

/* Main content */
.main {
    margin-left: 220px;
    padding: 30px;
}

/* KPI cards */
.kpi-container {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.kpi-card {
    flex: 1;
    height: 110px;
    background: white;
    border-radius: 12px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.08);
}

/* Chart containers */
.chart-row {
    display: flex;
    gap: 20px;
}

.chart-box {
    flex: 1;
    height: 300px;
    background: white;
    border-radius: 12px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Dashboard</h2>
    <div>Overview</div>
    <div>Sales</div>
    <div>Performance</div>
    <div>Settings</div>
</div>

<div class="main">

    <!-- KPI Row -->
    <div class="kpi-container">
        <div class="kpi-card"></div>
        <div class="kpi-card"></div>
        <div class="kpi-card"></div>
        <div class="kpi-card"></div>
    </div>

    <!-- Charts Row -->
    <div class="chart-row">
        <div class="chart-box"></div>
        <div class="chart-box"></div>
    </div>

</div>

</body>
</html>
