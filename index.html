<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Power BI Premium Layout</title>
<style>
body {
    margin: 0;
    font-family: Segoe UI, sans-serif;
    background: #eef2ff;
}

/* Main container */
.wrapper {
    width: 1200px;
    margin: 30px auto;
    padding: 20px;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 15px;
}

.title {
    font-size: 24px;
    font-weight: 600;
    color: #374151;
}

.tab {
    padding: 8px 15px;
    background: #e5e7eb;
    border-radius: 8px;
    margin-right: 8px;
}

/* KPI cards */
.kpi-row {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    height: 90px;
    background: white;
    border-radius: 10px;
}

/* Middle row */
.middle-row {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.big-box {
    flex: 1.3;
    height: 240px;
    background: white;
    border-radius: 10px;
}

.small-box {
    flex: 0.7;
    height: 240px;
    background: white;
    border-radius: 10px;
}

/* Bottom row */
.bottom-row {
    display: flex;
    gap: 20px;
}

.bottom-box {
    flex: 1;
    height: 220px;
    background: white;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="header">
        <div class="title">Dashboard Layout</div>
        <div>
            <span class="tab">Overview</span>
            <span class="tab">Market</span>
            <span class="tab">Segment & Categories</span>
        </div>
    </div>

    <div class="kpi-row">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
    </div>

    <div class="middle-row">
        <div class="big-box"></div>
        <div class="small-box"></div>
    </div>

    <div class="bottom-row">
        <div class="bottom-box"></div>
        <div class="bottom-box"></div>
    </div>

</div>

</body>
</html>
